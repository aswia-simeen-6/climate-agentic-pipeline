version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aurora-esg-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aurora_esg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aurora-esg-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aurora_esg
      DATABASE_SSL: disable
      PGSSLMODE: disable
      LLM_PROVIDER: anthropic
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MOCK_LLM: ${MOCK_LLM:-true}
      LLM_MODEL: claude-3-5-sonnet-20241022
      LLM_MAX_TOKENS: 1024
      LLM_TEMPERATURE: 0.1
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: production
      AGENT_TIMEOUT_MS: 120000
      METHODOLOGY_VERSION: v1.0.0
      P001_PEER_BENCHMARK_INTENSITY: 52.3
      P002_TSX60_AVERAGE_DIVERSITY: 0.282
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      sh -c "npm run db:migrate && npm run db:seed && npm start"

volumes:
  postgres_data:
